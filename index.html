<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CYBER-DECK // 神经漫游者终端 V5.0 </title>
    <style>
        :root {
            --bg-color: #0a0c10; --panel-bg: #121620;
            --cyber-blue: #00f2fe; --cyber-pink: #fe019a;
            --cyber-green: #00ff87; --cyber-orange: #ff5722;
            --text-main: #e2e8f0; --text-dim: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; padding-bottom: 30px; overflow-x: hidden; }

        header { background: linear-gradient(180deg, rgba(18,22,32,1) 0%, rgba(10,12,16,1) 100%); padding: 20px 15px 10px; text-align: center; position: sticky; top: 0; z-index: 100; }
        header h1 { font-size: 1.4rem; letter-spacing: 3px; color: #fff; text-shadow: 0 0 10px var(--cyber-blue); font-weight: 900; }
        header .subtitle { font-size: 0.7rem; color: var(--cyber-pink); letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; margin-bottom: 15px; }

        .cloud-console { display: flex; gap: 8px; padding: 0 15px 15px; justify-content: center; flex-wrap: wrap; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 10px;}
        .cyber-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--text-dim); color: var(--text-main); padding: 6px 10px; border-radius: 4px; font-size: 0.75rem; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
        .cyber-btn:hover { border-color: var(--cyber-blue); color: var(--cyber-blue); background: rgba(0,242,254,0.1); }
        .btn-sync { border-color: var(--cyber-blue); color: var(--cyber-blue); }
        .btn-stats { border-color: var(--cyber-orange); color: var(--cyber-orange); }
        .btn-stats:hover { background: rgba(255, 87, 34, 0.1); }

        .search-input { width: 100%; background: var(--panel-bg); border: 1px solid var(--text-dim); padding: 12px 15px; border-radius: 6px; color: white; outline: none; margin-bottom: 10px; }
        .search-input:focus { border-color: var(--cyber-blue); box-shadow: 0 0 10px rgba(0, 242, 254, 0.3); }

        .filter-container { display: flex; overflow-x: auto; gap: 8px; padding-bottom: 15px; border-bottom: 2px solid rgba(0, 242, 254, 0.3); scrollbar-width: none; }
        .filter-container::-webkit-scrollbar { display: none; } 
        
        .filter-tag { padding: 6px 14px; border-radius: 20px; background: rgba(255,255,255,0.05); color: var(--text-dim); font-size: 0.8rem; border: 1px solid transparent; white-space: nowrap; cursor: pointer; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .filter-tag.active { background: rgba(0, 242, 254, 0.1); border-color: var(--cyber-blue); color: var(--cyber-blue); text-shadow: 0 0 5px var(--cyber-blue); }
        .filter-tag.special-completed.active { border-color: var(--cyber-green); color: var(--cyber-green); text-shadow: 0 0 5px var(--cyber-green); background: rgba(0, 255, 135, 0.1); }
        .filter-tag.special-shelved.active { border-color: var(--cyber-orange); color: var(--cyber-orange); text-shadow: 0 0 5px var(--cyber-orange); background: rgba(255, 87, 34, 0.1); }

        /* --- 赛博朋克数据面板 CSS --- */
        .dashboard-panel { display: none; padding: 15px; background: rgba(10,12,16,0.95); border-bottom: 2px solid var(--cyber-orange); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .dashboard-panel.active { display: block; animation: slideDown 0.3s ease-out; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 15px 10px; text-align: center; }
        .stat-value { font-size: 1.8rem; font-weight: bold; font-family: monospace; text-shadow: 0 0 10px currentColor; margin-bottom: 4px;}
        .stat-label { font-size: 0.65rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;}
        
        .heatmap-wrapper { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 6px; padding: 15px; }
        .heatmap-title { font-size: 0.75rem; color: var(--cyber-blue); margin-bottom: 12px; display: flex; justify-content: space-between;}
        .heatmap-scroll { overflow-x: auto; scrollbar-width: none; direction: rtl; } /* rtl 使滚动条默认在最右侧(最新日期) */
        .heatmap-scroll::-webkit-scrollbar { display: none; }
        .heatmap-grid { display: flex; gap: 4px; padding-bottom: 5px; direction: ltr; width: max-content; }
        .heatmap-col { display: flex; flex-direction: column; gap: 4px; }
        .heatmap-cell { width: 12px; height: 12px; border-radius: 2px; background: rgba(255,255,255,0.05); transition: 0.2s; position: relative; }
        
        /* 绿格子热力等级 */
        .heatmap-cell.level-1 { background: rgba(0, 255, 135, 0.3); box-shadow: 0 0 5px rgba(0, 255, 135, 0.1); }
        .heatmap-cell.level-2 { background: rgba(0, 255, 135, 0.6); box-shadow: 0 0 8px rgba(0, 255, 135, 0.3); }
        .heatmap-cell.level-3 { background: rgba(0, 255, 135, 0.9); box-shadow: 0 0 12px rgba(0, 255, 135, 0.6); }
        .heatmap-cell.level-4 { background: #fff; box-shadow: 0 0 10px #fff, 0 0 15px var(--cyber-green); }

        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; padding: 15px; }
        .game-card { background: var(--panel-bg); border-radius: 6px; overflow: hidden; border: 1px solid rgba(255, 255, 255, 0.05); display: flex; flex-direction: column; position: relative; transition: transform 0.2s; cursor: pointer;}
        .game-card:active { transform: scale(0.95); }
        .game-card.status-shelved .poster-img { filter: grayscale(80%) sepia(20%) hue-rotate(180deg) opacity(0.6); }
        .game-card.status-completed { border-color: rgba(0, 255, 135, 0.4); }

        .poster-wrapper { width: 100%; aspect-ratio: 1 / 1; position: relative; background: #1a2030; overflow: hidden; border-bottom: 2px solid rgba(0, 242, 254, 0.2); }
        .poster-img { width: 100%; height: 100%; object-fit: cover; display: block; transition: filter 0.3s; }
        .poster-placeholder { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1e2640 0%, #0f1322 100%); color: rgba(255,255,255,0.1); font-size: 2rem; }

        .badge-completed { position: absolute; top: 5px; right: 5px; background: rgba(0, 255, 135, 0.2); border: 1px solid var(--cyber-green); color: var(--cyber-green); font-size: 0.5rem; padding: 2px 4px; font-weight: bold; border-radius: 3px; backdrop-filter: blur(2px); box-shadow: 0 0 5px rgba(0, 255, 135, 0.5); z-index: 10; }

        .game-info { padding: 8px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .game-title { font-size: 0.75rem; font-weight: 600; line-height: 1.2; height: 2.4em; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; color: #e2e8f0; transition: color 0.3s;}
        .game-card.status-completed .game-title { color: var(--cyber-green); text-shadow: 0 0 5px rgba(0,255,135,0.3); }
        .game-card.status-shelved .game-title { color: var(--text-dim); }

        .mini-progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 6px; overflow: hidden; }
        .mini-progress-bar { height: 100%; background: var(--cyber-green); width: 0%; transition: width 0.3s; box-shadow: 0 0 5px var(--cyber-green); }
        .mini-progress-text { font-size: 0.65rem; color: var(--cyber-green); margin-top: 2px; text-align: right; }

        .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .drawer-overlay.active { opacity: 1; pointer-events: auto; }
        .drawer { position: fixed; bottom: 0; left: 0; width: 100%; height: 85vh; background: var(--panel-bg); border-top: 3px solid var(--cyber-blue); box-shadow: 0 -5px 25px rgba(0,242,254,0.3); border-top-left-radius: 16px; border-top-right-radius: 16px; z-index: 201; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.1, 0.7, 0.1, 1); display: flex; flex-direction: column; }
        .drawer.active { transform: translateY(0); }
        .drawer-header { padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); position: relative; }
        .drawer-close { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; color: var(--text-dim); cursor: pointer; }
        .drawer-game-title { font-size: 1.2rem; color: white; padding-right: 30px; }
        .drawer-game-meta { font-size: 0.75rem; color: var(--cyber-pink); margin-top: 4px; display: flex; justify-content: space-between; align-items: center; }

        .shelve-toggle { display: flex; align-items: center; font-size: 0.75rem; color: var(--text-dim); background: rgba(255,255,255,0.05); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--text-dim); }
        .shelve-toggle.active { color: var(--cyber-orange); border-color: var(--cyber-orange); background: rgba(255, 87, 34, 0.1); }
        .shelve-checkbox { margin-right: 5px; accent-color: var(--cyber-orange); }

        .detail-progress-section { padding: 15px 20px; background: rgba(0,0,0,0.2); }
        .detail-progress-label { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 6px; }
        .detail-progress-bg { width: 100%; height: 10px; background: rgba(255,255,255,0.05); border-radius: 5px; overflow: hidden; border: 1px solid rgba(0,242,254,0.2); }
        .detail-progress-fill { height: 100%; background: linear-gradient(90deg, var(--cyber-blue), var(--cyber-green)); width: 0%; transition: width 0.3s; box-shadow: 0 0 8px var(--cyber-blue); }

        .node-list { flex-grow: 1; overflow-y: auto; padding: 10px 20px 30px 20px; }
        
        .node-group { margin-bottom: 4px; }
        .node-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 0; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; transition: background 0.2s; }
        .node-header:active { background: rgba(255,255,255,0.05); }
        
        .node-header-left { display: flex; align-items: center; gap: 10px; flex-grow: 1; }
        .chevron { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); font-size: 0.7rem; color: var(--text-dim); width: 12px; display: inline-block; text-align: center; }
        .node-group.expanded .chevron { transform: rotate(90deg); color: var(--cyber-blue); }
        
        .sub-nodes-container { display: none; padding: 5px 0 5px 25px; background: rgba(0,0,0,0.15); border-left: 2px solid rgba(0, 242, 254, 0.2); margin-left: 5px; }
        .node-group.expanded .sub-nodes-container { display: block; }
        
        .sub-node-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 15px 12px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        .sub-node-item:last-child { border-bottom: none; }
        .sub-node-name { font-size: 0.85rem; color: #cbd5e1; }
        .sub-count { font-size: 0.75rem; color: var(--text-dim); font-family: monospace; background: rgba(255,255,255,0.05); padding: 2px 6px; border-radius: 10px; margin-right: 10px;}
        .sub-count.completed { color: var(--cyber-green); background: rgba(0,255,135,0.1); border: 1px solid rgba(0,255,135,0.3); }

        .node-name { font-size: 0.95rem; color: #fff; line-height: 1.4; transition: color 0.3s; }
        .node-name.type-main { color: #e2e8f0; } 
        .node-name.type-branch { color: var(--cyber-blue); font-size: 0.9rem; } 
        .node-name.type-ending { color: var(--cyber-pink); font-weight: bold; } 
        .node-name.all-done { color: var(--cyber-green) !important; text-shadow: 0 0 5px rgba(0,255,135,0.3); }

        .cyber-checkbox { appearance: none; width: 22px; height: 22px; min-width: 22px; border: 2px solid var(--cyber-blue); border-radius: 4px; outline: none; cursor: pointer; position: relative; transition: all 0.2s; margin-left: 5px; }
        .cyber-checkbox:checked { background-color: var(--cyber-green); border-color: var(--cyber-green); box-shadow: 0 0 8px var(--cyber-green); }
        .cyber-checkbox:checked::after { content: '✓'; position: absolute; color: #0a0c10; font-size: 14px; font-weight: bold; top: 50%; left: 50%; transform: translate(-50%, -50%); }

        .sync-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 90%; max-width: 400px; background: var(--panel-bg); border: 1px solid var(--cyber-blue); border-radius: 8px; padding: 20px; z-index: 300; opacity: 0; pointer-events: none; transition: all 0.3s; box-shadow: 0 0 20px rgba(0,242,254,0.2); }
        .sync-modal.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
        .sync-modal h3 { color: var(--cyber-blue); font-size: 1rem; margin-bottom: 10px; text-align: center; }
        .sync-modal p { font-size: 0.75rem; color: var(--text-dim); margin-bottom: 15px; text-align: center; line-height: 1.4; }
        .empty-state { grid-column: 1 / -1; text-align: center; padding: 40px 20px; color: var(--text-dim); font-size: 0.9rem; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <h1>CYBER - DECK</h1>
        <div class="subtitle">神经漫游者终端 V5.0 (数据觉醒版)</div>
        
        <div class="cloud-console">
            <button class="cyber-btn" onclick="exportData()">💾 备份</button>
            <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
            <button class="cyber-btn" onclick="document.getElementById('importFile').click()">📂 导入</button>
            <button class="cyber-btn btn-sync" onclick="openSyncModal()">🌐 同步</button>
            <button class="cyber-btn" style="border-color: var(--cyber-green); color: var(--cyber-green);" onclick="addNewGameFromJSON()">➕ JSON录入与升级</button>
            <button class="cyber-btn btn-stats" onclick="toggleDashboard()">📊 热力图</button>
        </div>

        <input type="text" id="searchInput" class="search-input" placeholder="输入关键字检索库内游戏...">
        <div class="filter-container" id="filterContainer"></div>
    </header>

    <div class="dashboard-panel" id="dashboardPanel">
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="statTotalGames">0</div>
                <div class="stat-label">神经载体 (库总数)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--cyber-green);" id="statCompleted">0</div>
                <div class="stat-label">深度链接 (已通关)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--cyber-orange);" id="statShelved">0</div>
                <div class="stat-label">离线休眠 (吃灰中)</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" style="color: var(--cyber-blue);" id="statCompletionRate">0%</div>
                <div class="stat-label">总体同步进度率</div>
            </div>
        </div>
        <div class="heatmap-wrapper">
            <div class="heatmap-title">
                <span>活跃度矩阵 (最近半年)</span>
                <span id="heatmapTotalNode">0 次节点同步</span>
            </div>
            <div class="heatmap-scroll">
                <div class="heatmap-grid" id="heatmapGrid">
                    </div>
            </div>
        </div>
    </div>

    <div class="grid-container" id="libraryContainer"></div>

    <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
    <div class="drawer" id="detailDrawer">
        <div class="drawer-header">
            <div class="drawer-close" onclick="closeDrawer()">✕</div>
            <div class="drawer-game-title" id="drawerGameTitle">游戏名称</div>
            <div class="drawer-game-meta">
                <span id="drawerGameMeta">分类 / 节点类型</span>
                <label class="shelve-toggle" id="shelveToggleLabel">
                    <input type="checkbox" class="shelve-checkbox" id="shelveCheckbox" onchange="toggleShelve()"> 🧊 吃灰中
                </label>
            </div>
        </div>
        <div class="detail-progress-section">
            <div class="detail-progress-label">
                <span>同步进度</span>
                <span id="detailProgressPercent" style="color: var(--cyber-green);">0%</span>
            </div>
            <div class="detail-progress-bg">
                <div class="detail-progress-fill" id="detailProgressFill"></div>
            </div>
        </div>
        <div class="node-list" id="nodeListContainer"></div>
    </div>

    <div class="drawer-overlay" id="syncOverlay" onclick="closeSyncModal()"></div>
    <div class="sync-modal" id="syncModal">
        <h3>☁️ 神经连接配置 (GitHub API)</h3>
        <p>配置仅保存在当前浏览器的本地缓存中，绝对安全，不会上传至任何公共网络。</p>
        <input type="text" id="ghToken" class="search-input" placeholder="GitHub Personal Access Token" oninput="saveGhConfig()">
        <input type="text" id="ghOwner" class="search-input" placeholder="GitHub 用户名 (如: yourname)" oninput="saveGhConfig()">
        <input type="text" id="ghRepo" class="search-input" placeholder="仓库名 (如: cyber-deck-data)" oninput="saveGhConfig()">
        <input type="text" id="ghPath" class="search-input" placeholder="文件路径 (如: games.json)" oninput="saveGhConfig()">
        
        <div style="display: flex; gap: 10px; margin-top: 15px;">
            <button class="cyber-btn" style="flex: 1;" onclick="pullFromGitHub()">⬇️ 从云端拉取</button>
            <button class="cyber-btn" style="flex: 1; border-color: var(--cyber-pink); color: var(--cyber-pink);" onclick="pushToGitHub()" id="pushBtn">⬆️ 推送至云端</button>
        </div>
    </div>

    <script>
        let gameData = JSON.parse(localStorage.getItem('cyber_deck_progress_v4_final')) || [];
        let currentActiveGameId = null;
        let activeFilter = 'All'; 

        // 工具函数：获取格式化的今日日期 YYYY-MM-DD
        function getTodayString() {
            const d = new Date();
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
        }

        function saveData() { 
            localStorage.setItem('cyber_deck_progress_v4_final', JSON.stringify(gameData)); 
            if (document.getElementById('dashboardPanel').classList.contains('active')) {
                renderDashboard(); // 如果面板开着，实时刷新数据
            }
        }

        function calculatePercent(game) {
            if (!game.nodes || game.nodes.length === 0) return 0;
            let total = 0;
            let completed = 0;

            game.nodes.forEach((node, index) => {
                if (node.subNodes && node.subNodes.length > 0) {
                    total += node.subNodes.length;
                    completed += node.subNodes.filter(sn => sn.completed).length;
                } else {
                    total += 1;
                    if (game.progress && game.progress[index]) completed += 1;
                }
            });
            
            if (total === 0) return 0;
            return Math.round((completed / total) * 100);
        }

        // --- 数据看板与热力图引擎 ---
        function toggleDashboard() {
            const panel = document.getElementById('dashboardPanel');
            panel.classList.toggle('active');
            if(panel.classList.contains('active')) renderDashboard();
        }

        function renderDashboard() {
            if (gameData.length === 0) return;

            // 1. 计算头部基础统计
            let totalGames = gameData.length;
            let completedGames = 0;
            let shelvedGames = 0;
            let totalNodesAll = 0;
            let completedNodesAll = 0;
            
            const activityLog = {}; // 用于热力图：{ '2026-07-05': 2, ... }
            let totalActivityCount = 0;

            gameData.forEach(game => {
                const pct = calculatePercent(game);
                if (pct === 100) completedGames++;
                if (game.shelved && pct !== 100) shelvedGames++;

                game.nodes.forEach((node, i) => {
                    if (node.subNodes && node.subNodes.length > 0) {
                        totalNodesAll += node.subNodes.length;
                        node.subNodes.forEach(sn => {
                            if (sn.completed) completedNodesAll++;
                            // 抓取子任务完成时间戳
                            if (sn.completed && sn.completedDate) {
                                activityLog[sn.completedDate] = (activityLog[sn.completedDate] || 0) + 1;
                                totalActivityCount++;
                            }
                        });
                    } else {
                        totalNodesAll += 1;
                        if (game.progress && game.progress[i]) completedNodesAll++;
                        // 抓取主线遗留节点的完成时间戳
                        if (game.progressDates && game.progressDates[i]) {
                            activityLog[game.progressDates[i]] = (activityLog[game.progressDates[i]] || 0) + 1;
                            totalActivityCount++;
                        }
                    }
                });
            });

            document.getElementById('statTotalGames').innerText = totalGames;
            document.getElementById('statCompleted').innerText = completedGames;
            document.getElementById('statShelved').innerText = shelvedGames;
            document.getElementById('heatmapTotalNode').innerText = `${totalActivityCount} 次节点同步记录`;
            
            const overallRate = totalNodesAll === 0 ? 0 : Math.round((completedNodesAll / totalNodesAll) * 100);
            document.getElementById('statCompletionRate').innerText = `${overallRate}%`;

            // 2. 渲染热力图 (近180天)
            const heatmapGrid = document.getElementById('heatmapGrid');
            heatmapGrid.innerHTML = '';
            
            const today = new Date();
            const startDate = new Date(today);
            startDate.setDate(today.getDate() - 180);
            // 调整到当周的星期日作为列首
            startDate.setDate(startDate.getDate() - startDate.getDay());

            let currDate = new Date(startDate);
            let colsHtml = '';

            // 从左到右，从上到下生成格子
            while (currDate <= today || currDate.getDay() !== 0) {
                if (currDate.getDay() === 0) {
                    colsHtml += `<div class="heatmap-col">`;
                }

                const dateStr = currDate.getFullYear() + '-' + String(currDate.getMonth() + 1).padStart(2, '0') + '-' + String(currDate.getDate()).padStart(2, '0');
                const count = activityLog[dateStr] || 0;
                
                let level = 0;
                if (count === 1) level = 1;
                else if (count >= 2 && count <= 3) level = 2;
                else if (count >= 4 && count <= 6) level = 3;
                else if (count > 6) level = 4;

                const hoverTitle = count > 0 ? `${dateStr}: 完成 ${count} 项神经链接` : dateStr;
                colsHtml += `<div class="heatmap-cell level-${level}" title="${hoverTitle}"></div>`;

                if (currDate.getDay() === 6) {
                    colsHtml += `</div>`; 
                }
                currDate.setDate(currDate.getDate() + 1);
                
                if (currDate > today && currDate.getDay() === 0) break;
            }

            heatmapGrid.innerHTML = colsHtml;
        }

        // --- 主体渲染逻辑 ---
        function renderFilters() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = '';
            if (gameData.length === 0) return; 

            const uniqueCategories = [...new Set(gameData.map(g => g.category))].sort();
            const filters = [
                { id: 'All', label: '全部宇宙' },
                ...uniqueCategories.map(c => ({ id: c, label: c })),
                { id: 'Completed', label: '🎖️ 已通关', className: 'special-completed' },
                { id: 'Shelved', label: '🧊 吃灰中', className: 'special-shelved' }
            ];

            filters.forEach(f => {
                const tag = document.createElement('div');
                tag.className = `filter-tag ${f.className || ''} ${activeFilter === f.id ? 'active' : ''}`;
                tag.innerText = f.label;
                tag.onclick = () => {
                    activeFilter = f.id;
                    renderFilters();
                    renderLibrary(document.getElementById('searchInput').value);
                };
                container.appendChild(tag);
            });
        }

        function renderLibrary(filterText = '') {
            const container = document.getElementById('libraryContainer');
            container.innerHTML = '';

            if (gameData.length === 0) {
                container.innerHTML = `<div class="empty-state">数据库当前为空。<br><br>请点击顶部【🌐 GitHub 同步】配置并拉取您的云端数据。</div>`;
                return;
            }

            const displayGames = gameData.filter(game => {
                const pct = calculatePercent(game);
                const isCompleted = pct === 100;
                const isShelved = game.shelved && !isCompleted; 

                if (filterText && !game.name.toLowerCase().includes(filterText.toLowerCase())) return false;
                if (activeFilter === 'Completed') return isCompleted;
                if (activeFilter === 'Shelved') return isShelved;
                if (activeFilter !== 'All' && game.category !== activeFilter) return false;

                return true; 
            });

            displayGames.forEach(game => {
                const pct = calculatePercent(game);
                const card = document.createElement('div');
                
                let statusClass = '';
                if (pct === 100) statusClass = 'status-completed';
                else if (game.shelved) statusClass = 'status-shelved';
                
                card.className = `game-card ${statusClass}`;
                card.onclick = () => openDrawer(game.id);

                const badgeHtml = pct === 100 ? `<div class="badge-completed">100%</div>` : '';
                const posterHtml = game.cover ? `<img src="${game.cover}" class="poster-img">` : `<div class="poster-placeholder">⍜</div>`;

                card.innerHTML = `
                    <div class="poster-wrapper">${badgeHtml}${posterHtml}</div>
                    <div class="game-info">
                        <div class="game-title">${game.name}</div>
                        <div>
                            <div class="mini-progress-container"><div class="mini-progress-bar" style="width: ${pct}%"></div></div>
                            <div class="mini-progress-text">${pct}%</div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openDrawer(gameId) {
            currentActiveGameId = gameId;
            const game = gameData.find(g => g.id === gameId);
            
            document.getElementById('drawerGameTitle').innerText = game.name;
            document.getElementById('drawerGameMeta').childNodes[0].nodeValue = `${game.category} // ${game.unit}`;
            
            const shelveBox = document.getElementById('shelveCheckbox');
            const shelveLabel = document.getElementById('shelveToggleLabel');
            shelveBox.checked = game.shelved;
            if (game.shelved) shelveLabel.classList.add('active'); else shelveLabel.classList.remove('active');
            
            const pct = calculatePercent(game);
            shelveBox.disabled = (pct === 100);
            shelveLabel.style.opacity = (pct === 100) ? "0.3" : "1";

            updateDrawerProgress(game);
            renderNodeList(game);

            document.getElementById('drawerOverlay').classList.add('active');
            document.getElementById('detailDrawer').classList.add('active');
        }

        function closeDrawer() {
            document.getElementById('drawerOverlay').classList.remove('active');
            document.getElementById('detailDrawer').classList.remove('active');
            renderLibrary(document.getElementById('searchInput').value);
        }

        function toggleShelve() {
            const game = gameData.find(g => g.id === currentActiveGameId);
            const shelveBox = document.getElementById('shelveCheckbox');
            const shelveLabel = document.getElementById('shelveToggleLabel');
            game.shelved = shelveBox.checked;
            if (game.shelved) shelveLabel.classList.add('active'); else shelveLabel.classList.remove('active');
            saveData();
        }

        function updateDrawerProgress(game) {
            const pct = calculatePercent(game);
            document.getElementById('detailProgressPercent').innerText = `${pct}%`;
            document.getElementById('detailProgressFill').style.width = `${pct}%`;
            
            if (pct === 100) {
                game.shelved = false;
                document.getElementById('shelveCheckbox').checked = false;
                document.getElementById('shelveCheckbox').disabled = true;
                document.getElementById('shelveToggleLabel').classList.remove('active');
                document.getElementById('shelveToggleLabel').style.opacity = "0.3";
                saveData();
            } else {
                document.getElementById('shelveCheckbox').disabled = false;
                document.getElementById('shelveToggleLabel').style.opacity = "1";
            }
        }

        function renderNodeList(game) {
            const container = document.getElementById('nodeListContainer');
            container.innerHTML = '';

            game.nodes.forEach((node, index) => {
                const hasSubNodes = node.subNodes && node.subNodes.length > 0;
                
                const group = document.createElement('div');
                group.className = 'node-group';

                const header = document.createElement('div');
                header.className = 'node-header';

                if (hasSubNodes) {
                    const subCompleted = node.subNodes.filter(sn => sn.completed).length;
                    const subTotal = node.subNodes.length;
                    const isAllDone = subCompleted === subTotal;

                    header.innerHTML = `
                        <div class="node-header-left">
                            <span class="chevron">▶</span>
                            <span class="node-name ${node.type} ${isAllDone ? 'all-done' : ''}">${node.title}</span>
                        </div>
                        <div style="display: flex; align-items: center;">
                            <span class="sub-count ${isAllDone ? 'completed' : ''}">${subCompleted}/${subTotal}</span>
                            <input type="checkbox" class="cyber-checkbox parent-checkbox" ${isAllDone ? 'checked' : ''}>
                        </div>
                    `;
                    
                    const subContainer = document.createElement('div');
                    subContainer.className = 'sub-nodes-container';
                    const parentCb = header.querySelector('.parent-checkbox');
                    
                    parentCb.onclick = (e) => e.stopPropagation(); 
                    // [核心逻辑更新]：一键全选时记录时间戳
                    parentCb.onchange = (e) => {
                        const checked = e.target.checked;
                        const today = getTodayString();
                        
                        node.subNodes.forEach(sn => {
                            sn.completed = checked;
                            // 如果是打勾，记录今天日期(保留旧日期如果有)；取消打勾则清除日期
                            sn.completedDate = checked ? (sn.completedDate || today) : null;
                        });
                        saveData();
                        updateDrawerProgress(game);
                        
                        const subCheckboxes = subContainer.querySelectorAll('input[type="checkbox"]');
                        subCheckboxes.forEach(cb => cb.checked = checked);
                        
                        const countEl = header.querySelector('.sub-count');
                        const nameEl = header.querySelector('.node-name');
                        
                        countEl.innerText = `${checked ? subTotal : 0}/${subTotal}`;
                        if (checked) { countEl.classList.add('completed'); nameEl.classList.add('all-done'); } 
                        else { countEl.classList.remove('completed'); nameEl.classList.remove('all-done'); }
                    };

                    node.subNodes.forEach(subNode => {
                        const subItem = document.createElement('div');
                        subItem.className = 'sub-node-item';
                        subItem.innerHTML = `<span class="sub-node-name">${subNode.title}</span>`;
                        
                        const checkbox = document.createElement('input');
                        checkbox.type = 'checkbox';
                        checkbox.className = 'cyber-checkbox';
                        checkbox.checked = subNode.completed || false;
                        
                        // [核心逻辑更新]：单点子任务时记录时间戳
                        checkbox.onchange = (e) => {
                            subNode.completed = e.target.checked;
                            subNode.completedDate = e.target.checked ? getTodayString() : null;
                            
                            saveData();
                            updateDrawerProgress(game);
                            
                            const newSubCompleted = node.subNodes.filter(sn => sn.completed).length;
                            const countEl = header.querySelector('.sub-count');
                            const nameEl = header.querySelector('.node-name');
                            
                            countEl.innerText = `${newSubCompleted}/${subTotal}`;
                            
                            const allSubDone = newSubCompleted === subTotal;
                            parentCb.checked = allSubDone; 
                            
                            if (allSubDone) { countEl.classList.add('completed'); nameEl.classList.add('all-done'); } 
                            else { countEl.classList.remove('completed'); nameEl.classList.remove('all-done'); }
                        };
                        
                        subItem.appendChild(checkbox);
                        subContainer.appendChild(subItem);
                    });

                    header.onclick = (e) => { if (e.target.type !== 'checkbox') group.classList.toggle('expanded'); };

                    group.appendChild(header);
                    group.appendChild(subContainer);
                } else {
                    header.style.cursor = 'default';
                    const isChecked = game.progress ? (game.progress[index] || false) : false;
                    
                    header.innerHTML = `
                        <div class="node-header-left" style="padding-left: 10px;">
                            <span class="node-name ${node.type} ${isChecked ? 'all-done' : ''}">${node.title}</span>
                        </div>
                    `;

                    const checkbox = document.createElement('input');
                    checkbox.type = 'checkbox';
                    checkbox.className = 'cyber-checkbox';
                    checkbox.checked = isChecked;
                    
                    // [核心逻辑更新]：兼容老版本单层节点的打勾记录
                    checkbox.onchange = (e) => {
                        if (!game.progress) game.progress = [];
                        game.progress[index] = e.target.checked;
                        
                        if (!game.progressDates) game.progressDates = {};
                        game.progressDates[index] = e.target.checked ? getTodayString() : null;
                        
                        saveData();
                        updateDrawerProgress(game);
                        
                        const nameEl = header.querySelector('.node-name');
                        if (e.target.checked) nameEl.classList.add('all-done');
                        else nameEl.classList.remove('all-done');
                    };

                    header.appendChild(checkbox);
                    group.appendChild(header);
                }

                container.appendChild(group);
            });
        }

        document.getElementById('searchInput').addEventListener('input', (e) => renderLibrary(e.target.value));

        function exportData() {
            if (gameData.length === 0) return alert("当前数据库为空，无法导出。");
            const dataStr = JSON.stringify(gameData, null, 2);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `cyber_deck_backup_${new Date().getTime()}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        gameData = importedData;
                        saveData();
                        renderFilters();
                        renderLibrary();
                        if (document.getElementById('dashboardPanel').classList.contains('active')) renderDashboard();
                        alert("✅ 本地数据已成功导入！");
                    }
                } catch (error) {
                    alert("❌ JSON 文件格式有误，导入失败。");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; 
        }

        function addNewGameFromJSON() {
            const jsonString = prompt("【CYBER-DECK 数据录入端口】\n请在此粘贴单款游戏的 JSON 数据对象：");
            if (!jsonString) return; 
            try {
                const newGame = JSON.parse(jsonString);
                if (!newGame.id || !newGame.name || !newGame.nodes || !Array.isArray(newGame.nodes)) {
                    alert("❌ 录入失败：JSON 格式缺少必要字段 (需包含 id, name, nodes 数组)！");
                    return;
                }

                const existingIndex = gameData.findIndex(g => g.id === newGame.id);
                
                if (existingIndex !== -1) {
                    const confirmUpdate = confirm(`⚠️ 发现库中已有 [${newGame.name}]。\n\n是否要用这份更详细的章节数据【覆盖升级】旧数据？\n(注意：这会重置该游戏的打勾进度)`);
                    if (!confirmUpdate) return;
                    
                    if (!newGame.progress || newGame.progress.length !== newGame.nodes.length) {
                        newGame.progress = new Array(newGame.nodes.length).fill(false);
                    }
                    if (typeof newGame.shelved !== 'boolean') newGame.shelved = false;
                    
                    gameData[existingIndex] = newGame; 
                    alert(`✅ 升级成功：已将 [${newGame.name}] 细化为子章节模式！`);
                } else {
                    if (!newGame.progress || newGame.progress.length !== newGame.nodes.length) {
                        newGame.progress = new Array(newGame.nodes.length).fill(false);
                    }
                    if (typeof newGame.shelved !== 'boolean') newGame.shelved = false;
                    
                    gameData.unshift(newGame); 
                    alert(`✅ 录入成功：${newGame.name}`);
                }
                
                saveData(); 
                renderFilters();
                renderLibrary(document.getElementById('searchInput').value);

                if(confirm("是否立即将此次数据的升级变动【⬆️ 推送至 GitHub 云端】保存？\n(如果你已经配置好 Token，点击确定将自动上传)")) {
                    pushToGitHub();
                }

            } catch(e) {
                alert("❌ 录入失败：JSON 解析错误，请检查是否有多余的逗号或缺失引号！\n错误信息：" + e.message);
            }
        }

        const GH_CONFIG_KEY = 'cyber_deck_gh_config';

        function openSyncModal() {
            document.getElementById('syncOverlay').classList.add('active');
            document.getElementById('syncModal').classList.add('active');
            const config = JSON.parse(localStorage.getItem(GH_CONFIG_KEY) || '{}');
            if(config.token) document.getElementById('ghToken').value = config.token;
            if(config.owner) document.getElementById('ghOwner').value = config.owner;
            if(config.repo) document.getElementById('ghRepo').value = config.repo;
            if(config.path) document.getElementById('ghPath').value = config.path;
        }

        function closeSyncModal() {
            document.getElementById('syncOverlay').classList.remove('active');
            document.getElementById('syncModal').classList.remove('active');
        }

        function saveGhConfig() {
            const config = {
                token: document.getElementById('ghToken').value.trim(),
                owner: document.getElementById('ghOwner').value.trim(),
                repo: document.getElementById('ghRepo').value.trim(),
                path: document.getElementById('ghPath').value.trim()
            };
            localStorage.setItem(GH_CONFIG_KEY, JSON.stringify(config));
            return config;
        }

        async function pullFromGitHub() {
            const { token, owner, repo, path } = saveGhConfig();
            if (!token || !owner || !repo || !path) return alert("❌ 请完整填写所有配置项！");
            try {
                document.querySelector('button[onclick="pullFromGitHub()"]').innerText = "拉取中...";
                const response = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                    cache: "no-store"
                });
                if (!response.ok) throw new Error("拉取失败，请检查填写的信息是否完全正确，或仓库是否创建。");
                
                const resData = await response.json();
                const decodedContent = decodeURIComponent(escape(atob(resData.content)));
                
                gameData = JSON.parse(decodedContent);
                saveData();
                renderFilters();
                renderLibrary();
                if (document.getElementById('dashboardPanel').classList.contains('active')) renderDashboard();
                alert("✅ 云端数据同步成功！");
                closeSyncModal();
            } catch (error) {
                alert(error.message);
            } finally {
                document.querySelector('button[onclick="pullFromGitHub()"]').innerText = "⬇️ 从云端拉取";
            }
        }

        async function pushToGitHub() {
            const { token, owner, repo, path } = saveGhConfig();
            if (!token || !owner || !repo || !path) {
                alert("❌ 请先点击【🌐 GitHub 同步】填写好你的 Token 和仓库信息！");
                return;
            }
            if (gameData.length === 0) return alert("❌ 本地没有数据可供推送！");
            
            const pushBtn1 = document.getElementById('pushBtn');
            if (pushBtn1) pushBtn1.innerText = "推送中...";
            
            try {
                let sha = null;
                const getRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' },
                    cache: "no-store"
                });
                if (getRes.ok) {
                    const currentFile = await getRes.json();
                    sha = currentFile.sha;
                }
                const contentStr = JSON.stringify(gameData, null, 2);
                const encodedContent = btoa(unescape(encodeURIComponent(contentStr)));
                const putBody = {
                    message: "CYBER-DECK: 更新游戏进度与目录",
                    content: encodedContent,
                    ...(sha && { sha }) 
                };
                const putRes = await fetch(`https://api.github.com/repos/${owner}/${repo}/contents/${path}`, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${token}`, 
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(putBody)
                });
                if (!putRes.ok) throw new Error("推送失败，请检查 Token 权限 (需要勾选 repo 权限)。");
                alert("✅ 成功推送至 GitHub 云端！你的数据安全了。");
                closeSyncModal();
            } catch (error) {
                alert(error.message);
            } finally {
                if (pushBtn1) pushBtn1.innerText = "⬆️ 推送至云端";
            }
        }

        renderFilters();
        renderLibrary();
    </script>
</body>
</html>
